name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release'
        type: boolean
        default: true

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Pack TwitchLib local packages
      run: pack-twitchlib.bat
      shell: cmd

    - name: Restore dependencies
      run: dotnet restore

    - name: Set version from tag
      id: version
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        if ($tag -match '^v\d') {
          $version = $tag -replace '^v', ''
        } else {
          $version = "0.0.0"
        }
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT

    - name: Publish
      shell: pwsh
      run: dotnet publish PenguinTwitchBot/PenguinTwitchBot.csproj -c Release -r win-x64 --self-contained true "-p:PublishSingleFile=true" "-p:IncludeNativeLibrariesForSelfExtract=true" "-p:Version=${{ steps.version.outputs.VERSION }}" "-p:InformationalVersion=${{ steps.version.outputs.VERSION }}"

    - name: Publish Setup
      shell: pwsh
      run: dotnet publish PenguinTwitchBot.Setup/PenguinTwitchBot.Setup.csproj -c Release -r win-x64 --self-contained true "-p:PublishSingleFile=true" "-p:IncludeNativeLibrariesForSelfExtract=true" "-p:Version=${{ steps.version.outputs.VERSION }}" "-p:InformationalVersion=${{ steps.version.outputs.VERSION }}"

    - name: Zip publish output
      run: Compress-Archive -Path PenguinTwitchBot/bin/Release/net10.0/win-x64/publish/*, PenguinTwitchBot.Setup/bin/Release/net10.0/win-x64/publish/* -DestinationPath PenguinTwitchBot-${{ github.ref_name }}-full.zip

    - name: Create update zip
      shell: pwsh
      run: |
        $src = "PenguinTwitchBot/bin/Release/net10.0/win-x64/publish"
        $tmp = "update-tmp"
        Copy-Item -Path $src -Destination $tmp -Recurse
        Remove-Item "$tmp/appsettings.json" -ErrorAction SilentlyContinue
        Remove-Item "$tmp/appsettings.Development.json" -ErrorAction SilentlyContinue
        Remove-Item "$tmp/wwwroot/alerts" -Recurse -ErrorAction SilentlyContinue
        Remove-Item "$tmp/wwwroot/audio" -Recurse -ErrorAction SilentlyContinue
        Remove-Item "$tmp/wwwroot/gifs" -Recurse -ErrorAction SilentlyContinue
        Compress-Archive -Path "$tmp/*" -DestinationPath "PenguinTwitchBot-${{ github.ref_name }}-update.zip"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          PenguinTwitchBot-${{ github.ref_name }}-full.zip
          PenguinTwitchBot-${{ github.ref_name }}-update.zip
        draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
