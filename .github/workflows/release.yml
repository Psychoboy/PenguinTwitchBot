name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release (otherwise build/test zips only)'
        type: boolean
        default: false
      release_tag:
        description: 'Tag name to release (required when create_release is true, e.g. v1.2.3)'
        type: string
        default: ''
      draft:
        description: 'Create as draft release'
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      BUILD_LABEL: ${{ (github.event_name == 'workflow_dispatch' && inputs.release_tag != '' && inputs.release_tag) || github.ref_name }}

    strategy:
      matrix:
        rid:
          - win-x64
          - win-arm64
          - linux-x64
          - linux-arm64
          - osx-x64
          - osx-arm64

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Set version from tag
      id: version
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        if ($tag -match '^v\d') {
          $version = $tag -replace '^v', ''
        } else {
          $version = "0.0.0"
        }
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT

    - name: Publish
      shell: pwsh
      run: dotnet publish PenguinTwitchBot/PenguinTwitchBot.csproj -c Release -r ${{ matrix.rid }} --self-contained true "-p:PublishSingleFile=true" "-p:IncludeNativeLibrariesForSelfExtract=true" "-p:Version=${{ steps.version.outputs.VERSION }}" "-p:InformationalVersion=${{ steps.version.outputs.VERSION }}"

    - name: Publish Setup
      shell: pwsh
      run: dotnet publish PenguinTwitchBot.Setup/PenguinTwitchBot.Setup.csproj -c Release -r ${{ matrix.rid }} --self-contained true "-p:PublishSingleFile=true" "-p:IncludeNativeLibrariesForSelfExtract=true" "-p:Version=${{ steps.version.outputs.VERSION }}" "-p:InformationalVersion=${{ steps.version.outputs.VERSION }}"

    - name: Create full zip
      shell: pwsh
      run: |
        Compress-Archive -Path "PenguinTwitchBot/bin/Release/net10.0/${{ matrix.rid }}/publish/*", "PenguinTwitchBot.Setup/bin/Release/net10.0/${{ matrix.rid }}/publish/*" -DestinationPath "PenguinTwitchBot-${{ env.BUILD_LABEL }}-${{ matrix.rid }}-full.zip"

    - name: Create update zip
      shell: pwsh
      run: |
        $src = "PenguinTwitchBot/bin/Release/net10.0/${{ matrix.rid }}/publish"
        $tmp = "update-tmp"
        Copy-Item -Path $src -Destination $tmp -Recurse
        Remove-Item "$tmp/appsettings.json" -ErrorAction SilentlyContinue
        Remove-Item "$tmp/appsettings.Development.json" -ErrorAction SilentlyContinue
        Remove-Item "$tmp/wwwroot/alerts" -Recurse -ErrorAction SilentlyContinue
        Remove-Item "$tmp/wwwroot/audio" -Recurse -ErrorAction SilentlyContinue
        Remove-Item "$tmp/wwwroot/gifs" -Recurse -ErrorAction SilentlyContinue
        Compress-Archive -Path "$tmp/*" -DestinationPath "PenguinTwitchBot-${{ env.BUILD_LABEL }}-${{ matrix.rid }}-update.zip"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-${{ matrix.rid }}
        path: |
          PenguinTwitchBot-${{ env.BUILD_LABEL }}-${{ matrix.rid }}-full.zip
          PenguinTwitchBot-${{ env.BUILD_LABEL }}-${{ matrix.rid }}-update.zip

  release:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.create_release && inputs.release_tag != '') }}
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ github.event_name == 'push' && github.ref_name || inputs.release_tag }}

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: release-*
        merge-multiple: true

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: "*.zip"
        tag_name: ${{ env.TAG_NAME }}
        draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
