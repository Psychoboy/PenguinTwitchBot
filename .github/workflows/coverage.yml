name: Codacy-Coverage

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build:
    name: Run Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --configuration Debug --no-restore
      - name: Test PenguinTwitchBot.Test
        run: dotnet test PenguinTwitchBot.Test/PenguinTwitchBot.Test.csproj --configuration Debug --verbosity normal --settings coverlet.runsettings
      - name: Test PenguinTwitchBot.TwitchApi.Test
        run: dotnet test PenguinTwitchBot.TwitchApi.Test/PenguinTwitchBot.TwitchApi.Test.csproj --configuration Debug --verbosity normal --settings coverlet.runsettings
      - name: Find coverage files
        run: |
          echo "=== Searching for coverage.opencover.xml files ==="
          find . -type f -name "coverage.opencover.xml" 2>/dev/null || echo "No coverage.opencover.xml files found"
          echo "=== All XML files in TestResults ==="
          find . -type d -name "TestResults" -exec find {} -type f -name "*.xml" \; 2>/dev/null || echo "No TestResults/XML files found"
      - name: Codacy Coverage Reporter
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: '**/coverage.opencover.xml'
          verbose: true
