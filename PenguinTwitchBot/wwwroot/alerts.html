<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <style>
        body {
            background-color: transparent;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        #main-video-clips {
            text-align: center;
        }

        .main-alert {
            flex: 1 1 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            max-width: 100%;
            overflow: hidden;
        }

        #alert {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            min-width: 0;
        }

        .main-alert img,
        .main-alert video:not(.fullscreen) {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .main-text-alert {
            flex: 0 0 auto;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 0;
            overflow: hidden;
        }

        #alert-text {
            width: 100%;
            text-align: center;
            padding: 0 8px;
            box-sizing: border-box;
        }

        #alert-text p {
            margin: 0;
            max-width: 100%;
            line-height: 1.2;
            white-space: normal;
            overflow-wrap: anywhere;
        }

        #main-emotes {
            position: absolute;
            left: 0;
            top: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        #browserInteractionButton {
            cursor: pointer;
            font-size: 2em;
            font-weight: 30;
            margin: 0 25vw;
            position: absolute;
            top: 50%;
            width: 50vw;
        }

        video.fullscreen {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
        }

        .animatedEmote {
            position: fixed;
        }

        #ws-status {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.85em;
            font-weight: bold;
            color: #fff;
            background: #c0392b;
            opacity: 1;
            transition: opacity 0.6s ease;
            pointer-events: none;
            z-index: 9999;
        }

        #ws-status.connected {
            background: #27ae60;
        }

        #ws-status.hidden {
            opacity: 0;
        }
    </style>
</head>
<body>
    <div id="ws-status">Disconnected</div>

    <div id="main-video-clips">
        <!-- Where the video clips are played. -->
    </div>
    <div id="main-emotes">
        <!-- Where the emotes are played. -->
    </div>
    <div class="main-alert">
        <!-- Where the gif gets played. -->
        <div id="alert"></div>
    </div>
    <div class="main-text-alert">
        <!-- Where the custom gif text is displayed. -->
        <div id="alert-text"></div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.1.min.js" integrity="sha384-i61gTtaoovXtAbKjo903+O55Jkn2+RtzHtvNez+yI49HAASvznhe9sZyjaSHTau9" crossorigin="anonymous"></script>
    <script src="js/reconnecting-websocket/reconnectingWS.min.js"></script>
