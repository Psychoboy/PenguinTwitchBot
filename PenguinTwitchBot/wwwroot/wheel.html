<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Bot Wheel</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Rubik">
    <style>
        body {
            font-family: "Rubik", rubik;
        }

        #ws-status {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.85em;
            font-weight: bold;
            color: #fff;
            background: #c0392b;
            opacity: 1;
            transition: opacity 0.6s ease;
            pointer-events: none;
            z-index: 9999;
        }

        #ws-status.connected {
            background: #27ae60;
        }

        #ws-status.hidden {
            opacity: 0;
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.1.min.js" integrity="sha384-i61gTtaoovXtAbKjo903+O55Jkn2+RtzHtvNez+yI49HAASvznhe9sZyjaSHTau9" crossorigin="anonymous"></script>
    <script src="https://code.createjs.com/1.0.0/soundjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/spin-wheel@5.0.2/dist/spin-wheel-iife.js"></script>
    <script src="js/reconnecting-websocket/reconnectingWS.min.js"></script>
    <script src="js/ws-status.js"></script>
    <script src="js/wheel.js"></script>
</head>
<body>
    <div id="ws-status">Disconnected</div>
    <div class="container">
        <div class="wheel-container"></div>
    </div>
</body>
</html>
